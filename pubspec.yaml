name: fluxvpn
description: "FluxVPN - A professional VPN application with modern UI design"
publish_to: "none"

version: 1.0.0

environment:
  sdk: ">=3.9.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: ^0.20.2

  cupertino_icons: ^1.0.8

  flutter_v2ray_client:
    path: local_packages/flutter_v2ray_client

  fluent_ui: ^4.13.0
  glassmorphism: ^3.0.0
  http: ^1.5.0
  provider: ^6.1.5
  shared_preferences: ^2.5.3
  connectivity_plus: ^7.0.0
  path_provider: ^2.1.5
  mobile_scanner: ^7.1.2
  qr_flutter: ^4.1.0
  permission_handler: ^12.0.1
  country_flags: ^3.0.0
  logger: ^2.0.0
  fl_chart: ^0.68.0
  flutter_secure_storage: ^9.0.0
  wireguard_flutter: ^0.1.3
  uuid: ^4.5.1
  file_picker: ^8.1.2
  image_picker: ^1.0.8
  package_info_plus: ^8.0.0
  url_launcher: ^6.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

dependency_overrides:
  intl: ^0.20.2

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/flags/
    - assets/WAL1.png
    - assets/WAL2.png
    - assets/WAL3.png

  fonts:
    - family: Vazirmatn
      fonts:
        - asset: assets/fonts/Vazirmatn-Bold.ttf
          weight: 700
